<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Wordfreak">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Wordfreak</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon.svg">
  <link rel="stylesheet" href="styles.css?v=10">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <div class="brand">Wordfreak</div>
        <div id="datasetMeta" class="dataset-meta">Loading</div>
      </div>
      <div class="top-controls">
        <button id="bookToggle" class="icon-btn" type="button" aria-label="Books" title="Books">&#128214;</button>
        <button id="settingsToggle" class="icon-btn" type="button" aria-label="Settings" title="Settings">&#9881;</button>
      </div>
    </header>

    <section class="focus-stage" aria-live="polite">
      <article class="focus-pane focus-ru">
        <div class="focus-kicker">
          <span id="rankLabel">#</span>
          <span id="posLabel"></span>
        </div>
        <h1 id="ruWord" lang="ru">...</h1>
      </article>
      <article class="focus-pane focus-en">
        <div id="meaningState" class="focus-kicker">English</div>
        <h2 id="enWord">...</h2>
      </article>
    </section>

    <nav class="transport" aria-label="Playback controls">
      <button id="prevBtn" type="button">Prev</button>
      <button id="playBtn" class="primary" type="button">Play</button>
      <button id="nextBtn" type="button">Next</button>
      <button id="shuffleBtn" type="button" aria-pressed="false">Shuffle</button>
    </nav>

    <section id="settingsPanel" class="settings-panel" hidden>
      <label>
        Language
        <select id="languageSelect">
          <option value="ru" selected>Russian</option>
          <option value="fa">Farsi</option>
        </select>
      </label>
      <label>
        Band
        <select id="bandSelect" aria-label="Word band">
          <option value="500">500</option>
          <option value="1500">1.5k</option>
          <option value="3000">3k</option>
          <option value="5000">5k</option>
          <option value="10000">10k</option>
          <option value="16000">16k</option>
          <option value="20000" selected>20k</option>
          <option value="all">All</option>
        </select>
      </label>
      <label>
        TTS
        <select id="engineSelect">
          <option value="system" selected>System</option>
          <option value="piper">Piper</option>
        </select>
      </label>
      <label>
        <span id="sourceVoiceLabel">RU voice</span>
        <select id="sourceVoiceSelect">
          <option value="">Auto</option>
        </select>
      </label>
      <label>
        EN voice
        <select id="enVoiceSelect">
          <option value="">Auto</option>
        </select>
      </label>
      <label>
        EN region
        <select id="enLangSelect">
          <option value="">Default</option>
          <option value="en-US">en-US</option>
          <option value="en-GB">en-GB</option>
          <option value="en-AU">en-AU</option>
          <option value="en-CA">en-CA</option>
          <option value="en-IE">en-IE</option>
          <option value="en-IN">en-IN</option>
          <option value="en-NZ">en-NZ</option>
          <option value="en-ZA">en-ZA</option>
        </select>
      </label>
      <label>
        <span class="setting-title">
          <span id="sourceRateLabel">RU speed</span>
          <output id="ruRateValue">0.82x</output>
        </span>
        <input id="ruRate" type="range" min="0.55" max="1.25" step="0.05" value="0.82">
      </label>
      <label>
        <span class="setting-title">
          EN speed
          <output id="enRateValue">0.95x</output>
        </span>
        <input id="enRate" type="range" min="0.65" max="1.35" step="0.05" value="0.95">
      </label>
      <label>
        <span class="setting-title">
          Volume
          <output id="pageVolumeValue">80%</output>
        </span>
        <input id="pageVolume" type="range" min="0" max="1" step="0.05" value="0.8">
      </label>
      <label>
        <span class="setting-title">
          Gap
          <output id="gapValue">80 ms</output>
        </span>
        <input id="gapMs" type="range" min="0" max="500" step="20" value="80">
      </label>
      <label>
        <span class="setting-title">
          Queue
          <output id="piperAheadValue">4</output>
        </span>
        <input id="piperAhead" type="range" min="0" max="8" step="1" value="4">
      </label>
      <label class="checkbox-setting">
        <span class="setting-title">
          Lock audio
          <output id="backgroundAudioValue">Off</output>
        </span>
        <input id="backgroundAudio" type="checkbox">
      </label>
      <label>
        <span class="setting-title">
          Batch
          <output id="backgroundBatchValue">32</output>
        </span>
        <input id="backgroundBatch" type="range" min="8" max="96" step="8" value="32">
      </label>
    </section>

    <section id="bookView" class="book-view" hidden>
      <div class="book-mode-head">
        <div class="book-heading">
          <div class="book-kicker">Standard Ebooks</div>
          <h2 id="bookModeTitle">Library</h2>
        </div>
        <div class="book-head-actions">
          <button id="bookShelfBtn" type="button">Shelf</button>
          <button id="bookRandomBtn" class="primary" type="button">Random</button>
        </div>
      </div>

      <div class="book-control-grid">
        <label>
          Language
          <select id="bookLanguageSelect">
            <option value="ru" selected>Russian</option>
            <option value="fa">Farsi</option>
          </select>
        </label>
        <label>
          Shelf page
          <input id="bookPageInput" type="number" min="1" value="1">
        </label>
        <button id="bookLoadPageBtn" type="button">Load</button>
        <button id="bookPrevPageBtn" type="button">Back</button>
        <button id="bookNextPageBtn" type="button">Next</button>
      </div>

      <div class="book-reader-controls">
        <button id="bookPrevSentenceBtn" type="button">Prev</button>
        <button id="bookPlayBtn" class="primary" type="button">Play</button>
        <button id="bookNextSentenceBtn" type="button">Next</button>
        <label>
          <span class="setting-title">
            Source speed
            <output id="bookSourceRateValue">0.82x</output>
          </span>
          <input id="bookSourceRate" type="range" min="0.55" max="1.25" step="0.05" value="0.82">
        </label>
        <label>
          <span class="setting-title">
            EN speed
            <output id="bookEnRateValue">0.95x</output>
          </span>
          <input id="bookEnRate" type="range" min="0.65" max="1.35" step="0.05" value="0.95">
        </label>
        <label>
          <span class="setting-title">
            Volume
            <output id="bookVolumeValue">80%</output>
          </span>
          <input id="bookVolume" type="range" min="0" max="1" step="0.05" value="0.8">
        </label>
      </div>

      <article id="bookReader" class="book-reader" hidden>
        <header class="reader-head">
          <div class="reader-title-block">
            <div id="bookReaderMeta" class="book-kicker">No book loaded</div>
            <h2 id="bookReaderTitle">Pick a book</h2>
          </div>
          <a id="bookSourceLink" class="book-source-link" href="https://standardebooks.org/ebooks" target="_blank" rel="noopener noreferrer">Source</a>
        </header>

        <div class="reader-nav-row">
          <label>
            Chapter
            <select id="bookChapterSelect"></select>
          </label>
          <label class="reader-progress-field">
            <span class="setting-title">
              Position
              <output id="bookProgressValue">0%</output>
            </span>
            <input id="bookProgressRange" type="range" min="0" max="0" value="0">
          </label>
        </div>

        <div class="dual-sentence">
          <section class="reader-pane source-reader-pane">
            <div id="bookSourceLabel" class="reader-label">Russian</div>
            <p id="bookSourceSentence" class="reader-sentence" lang="ru">Select a book to begin.</p>
          </section>
          <section class="reader-pane english-reader-pane">
            <div class="reader-label">English</div>
            <p id="bookEnglishSentence" class="reader-sentence" lang="en">The English original will appear here.</p>
          </section>
        </div>

        <div id="bookNearbyList" class="book-nearby" aria-label="Nearby sentences"></div>
      </article>

      <section id="bookShelf" class="book-shelf" aria-label="Book shelf"></section>
    </section>

    <section class="list-shell">
      <div class="list-head" aria-hidden="true">
        <span id="sourceHead">Russian</span>
        <span>English</span>
      </div>
      <div id="wordList" class="word-list" tabindex="0" aria-label="Frequency list">
        <div id="listSpacer" class="list-spacer">
          <div id="virtualRows" class="virtual-rows"></div>
        </div>
      </div>
    </section>

    <footer class="statusbar">
      <span id="statusText">Ready</span>
      <span id="progressText">0 / 0</span>
    </footer>
  </main>
  <audio id="backgroundAudioPlayer" class="background-audio" preload="auto" playsinline></audio>

  <script src="app.js?v=17" defer></script>
</body>
</html>
